[net]
# Neural network architecture: input=FEATURE_SIZE(8), hidden layers, output=1 (sigmoid)
layer_sizes = [8, 16, 8, 1]
learning_rate = 0.1

[agent]
plan_candidate_count = 4
data_dir = "~/.axiom"

[safety]
# Commands matching these substrings (case-insensitive) are blocked before execution
blocklist = [
    "rm -rf /",
    "sudo",
    "mkfs",
    "dd if=",
    ":(){:|:&};:",
    "chmod 777 /",
    "shutdown",
    "reboot",
    "> /dev/sda"
]